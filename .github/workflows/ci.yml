name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(stat -f%z main.js 2>/dev/null || stat -c%s main.js)
          echo "Bundle size: $((SIZE / 1024)) KB"
          if [ "$SIZE" -gt 1048576 ]; then
            echo "WARNING: Bundle exceeds 1 MB ($((SIZE / 1024)) KB)"
          fi
